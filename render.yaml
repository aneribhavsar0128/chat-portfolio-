services:
  - type: web
    name: aneri-ai-chat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You will paste this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
